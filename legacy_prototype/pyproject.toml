[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.ruff]
line-length = 110
target-version = "py310"
exclude = ["venv", ".venv", "instance", "uploads", "backups"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # طول السطر يُدار بـ line-length
